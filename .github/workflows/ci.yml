name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check src/app.py

      - name: Ruff format check
        run: uv run ruff format --check src/app.py

      - name: Black format check
        run: uv run black --check src/app.py

      - name: mypy type check
        run: uv run mypy src/app.py

      - name: Run tests (unit + API)
        run: uv run pytest tests/test_algorithm.py tests/test_api.py -v --cov=src.app --cov-report=term-missing --cov-fail-under=80

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"

      - name: Install Node dependencies
        run: npm ci

      - name: HTML / JS lint
        run: |
          npx prettier --check "docs/*.html" templates/home.html templates/face.html templates/voice.html templates/signature.html templates/mouse.html
          npx htmlhint "docs/*.html" "templates/*.html"
          npx eslint "docs/*.html" templates/face.html templates/voice.html templates/signature.html templates/mouse.html
