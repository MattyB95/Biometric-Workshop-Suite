version: 2
updates:
  # ── Python (pyproject.toml) ──────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      python-dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "python"

  # ── npm (linting / formatting tools) ────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-dev-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "javascript"

  # ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
